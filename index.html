
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Sphere · professional splash</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0f24;  /* deep navy backup */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* refined ink‑blot splash – smoother, softer edges */
        .splash {
            position: absolute;
            width: 0;
            height: 0;
            background: radial-gradient(circle at center, #1f2b5c 0%, #121a40 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0,20,80,0.6);
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            animation: splashBloom 1.4s cubic-bezier(0.45, 0.9, 0.3, 1) forwards;
            animation-delay: 0.6s;
            z-index: 1;
        }

        @keyframes splashBloom {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                width: 2300px;
                height: 2300px;
                opacity: 1;
                background: radial-gradient(circle at center, #26378c 0%, #0f1a44 100%);
            }
        }

        /* main card – floats above splash */
        .content {
            position: relative;
            z-index: 20;
            text-align: center;
            opacity: 0;
            animation: fadeRise 1s ease-out forwards;
            animation-delay: 2.1s;
            transform: translateY(12px);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
        }

        @keyframes fadeRise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ------- logo button (modern, interactive) ------- */
        .logo-button {
            display: inline-block;
            background: white;
            width: 200px;
            height: 200px;
            border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
            background: linear-gradient(145deg, #ffffff, #f2f5ff);
            box-shadow: 
                0 30px 40px -10px rgba(0, 8, 39, 0.5),
                0 0 0 2px rgba(255,255,255,0.3) inset,
                0 -2px 5px rgba(0,0,0,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            cursor: pointer;
            position: relative;
            border: none;
            padding: 0;
            outline: none;
            animation: floatGlow 3s infinite alternate ease-in-out;
        }

        .logo-button:hover {
            transform: scale(1.04) rotate(1deg);
            background: linear-gradient(145deg, #ffffff, #eaefff);
            box-shadow: 
                0 40px 50px -8px #0b1a5a,
                0 0 0 4px rgba(255,255,255,0.5) inset;
        }

        .logo-button:active {
            transform: scale(0.98);
            transition: 0.1s;
            box-shadow: 0 15px 25px -5px #020a2b;
        }

        /* subtle floating motion */
        @keyframes floatGlow {
            0% {
                border-radius: 40% 60% 35% 65% / 45% 40% 60% 55%;
                box-shadow: 0 25px 40px -10px #112052;
            }
            100% {
                border-radius: 50% 40% 60% 40% / 45% 55% 45% 55%;
                box-shadow: 0 35px 55px -8px #14287a;
            }
        }

        /* inner image: fit with soft white glow */
        .logo-button img {
            width: 140px;
            height: auto;
            display: block;
            border-radius: 30% 40% 30% 40%;
            filter: drop-shadow(0 8px 12px rgba(0,20,50,0.3));
            transition: filter 0.2s;
        }

        .logo-button:hover img {
            filter: drop-shadow(0 10px 16px #29419b);
        }

        /* company name refined */
        .company-name {
            font-family: 'Merriweather', serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 2px 4px #00000040;
            margin-top: 10px;
            line-height: 1.2;
        }

       

        /* tagline elegance */
        .motto span {
            font-weight: 600;
            color: white;
            background: linear-gradient(120deg, #ffd966, #ffe69b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* extra micro detail: subtle rotating ring behind logo (optional) */
        .ring-back {
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0.5;
            animation: spinSlow 20s infinite linear;
        }

        @keyframes spinSlow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* fine details for larger screens */
        @media (min-width: 800px) {
            .logo-button {
                width: 230px;
                height: 230px;
            }
            .logo-button img {
                width: 260px;
            }
        }

        /* accessibility & button reset */
        .logo-button:focus-visible {
            outline: 3px solid white;
            outline-offset: 6px;
        }

        /* optional progress bar? no, minimal – but keep clean */
        .bottom-note {
            position: absolute;
            bottom: 24px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            letter-spacing: 1px;
            z-index: 30;
            opacity: 0;
            animation: fadeRise 1s 3s forwards;
            font-weight: 300;
            backdrop-filter: blur(3px);
        }
    </style>
</head>
<body>

    <!-- expanding background splash (more dynamic than original) -->
    <div class="splash"></div>

    <!-- subtle spinning ring behind logo (adds depth) -->
    <div class="ring-back"></div>

    <!-- main content: logo as button, name, motto -->
    <div class="content">
        <!-- interactive logo button (professional ui) -->
        <button class="logo-button" aria-label="Growth Sphere home" onclick="window.location.href='#'; return false;">
            <img src="output-onlinepngtools.png"
                 alt="Growth Sphere emblem: rising graph inside sphere">
        </button>

        <div class="company-name">GROWTH SPHERE</div>
        <div class="motto"><span>learning to earning</span> – for everyone</div>
    </div>

    <!-- tiny credit line / professionalism (optional) -->
    <div class="bottom-note">✦  where potential meets trajectory  ✦</div>

    <script>
        (function() {
            // makes the logo button behave like a professional link (but you can replace # with actual URL)
            const btn = document.querySelector('.logo-button');
            if(btn) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // subtle micro-interaction: quick pulse (modern ux)
                    btn.style.transform = 'scale(0.97)';
                    setTimeout(() => {
                        btn.style.transform = '';
                        // you could redirect, for demo we just blur
                        window.location.href = "login.html";
                    }, 120);
                });
            }
        })();
    </script>

    <!-- fallback: if image doesn't load, button has background color – but svg embedded so safe -->
</body>
</html>
