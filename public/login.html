
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Sphere · professional register</title>
    <!-- Google Fonts & Font Awesome (clean, modern) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* 🎨 Dark Navy Blue theme with neon-style blue highlights */
        :root {
            --primary-dark: #0a142f;      /* deep navy base */
            --primary: #132043;            /* midnight blue */
            --primary-light: #1e3163;      /* deep blue */
            --accent-blue: #2b4b9a;        /* slate blue / accent */
            --highlight: #5d9bff;          /* light blue (neon highlight) */
            --soft-purple: #9b87f5;        /* violet for icons/tags */
            --teal-accent: #2dd4bf;         /* teal / cyan accent */
            --error: #ef4444;               
            --bg-start: #0a142f;            /* dark navy gradient start */
            --bg-end: #1b2b5c;               /* midnight blue gradient end */
            --card-bg: rgba(10, 22, 45, 0.95);
            --card-border: rgba(93, 155, 255, 0.35);
            --text-light: #ffffff;           /* white text */
            --text-muted: #cbd5e1;           /* soft white/blueish */
            --input-bg: #1f2b4f;
            --input-border: #34497b;
            --input-focus: #5d9bff;          /* light blue focus */
            --placeholder: #8496c0;
            --switch-bg: #1e2b52;
            --glow: rgba(93, 155, 255, 0.5);  /* neon blue glow */
        }

        body {
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
            position: relative;
        }

        /* soft decorative elements (subtle neon spots) */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(93, 155, 255, 0.03) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(241, 242, 242, 0.04) 0%, transparent 35%);
            pointer-events: none;
        }

        /* main card – deep navy with glass, neon border */
        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(6px);
            width: 440px;
            max-width: 100%;
            padding: 2.5rem 2.2rem;
            border-radius: 32px;
            box-shadow: 0 30px 50px -15px rgba(0,0,0,0.9), 0 0 0 1px var(--card-border) inset;
            transition: transform 0.25s ease;
            animation: card-appear 0.4s ease-out;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(230, 233, 237, 0.25);
        }

        @keyframes card-appear {
            0% { opacity: 0.5; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* logo area — white + soft purple/violet */
        .logo {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-light);
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .logo i {
            font-size: 2rem;
            color: var(--soft-purple);       /* violet icon */
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 18px;
            border: 1px solid rgba(93,155,255,0.2);
        }

        .greeting {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(93, 155, 255, 0.25);
            padding-bottom: 1.2rem;
        }

        /* modern form layout */
        .input-field {
            margin-bottom: 1.4rem;
            text-align: left;
        }

        .input-field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #b0c8ff;                   /* soft light blue */
            margin-bottom: 0.3rem;
        }

        .input-field label i {
            margin-right: 5px;
            font-size: 0.75rem;
            color: var(--soft-purple);          /* violet icons */
        }

        .input-field input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--input-bg);
            border-radius: 18px;
            border: 1.5px solid var(--input-border);
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.15s ease;
            outline: none;
        }

        .input-field input:focus {
            border-color: var(--highlight);
            background: #1f2f5a;
            box-shadow: 0 0 0 3px var(--glow);
        }

        .input-field input::placeholder {
            color: var(--placeholder);
            font-weight: 400;
            font-size: 0.9rem;
        }

        /* captcha row — neon style */
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .captcha-display {
            background: linear-gradient(135deg, #1a274a, #0f1a3a);
            color: #aac8ff;                     /* light blue text */
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 6px;
            padding: 0.6rem 0.2rem;
            text-align: center;
            border-radius: 18px;
            flex: 1;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.6);
            border: 1px solid var(--highlight);
            text-shadow: 0 2px 3px black;
        }

        .refresh-btn {
            background: #273b68;
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 18px;
            color: var(--teal-accent);          /* teal icon */
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--highlight);
        }

        .refresh-btn:hover {
            background: #2f4a80;
            transform: rotate(25deg);
            border-color: var(--teal-accent);
            color: white;
        }

        /* checkbox — modern toggle (with violet) */
        .robot-check {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1d2c55;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            margin: 1.5rem 0 1rem 0;
            border: 1px solid var(--highlight);
            transition: 0.2s;
        }

        .robot-check input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--teal-accent);    /* teal checkbox */
            border-radius: 8px;
            cursor: pointer;
        }

        .robot-check label {
            font-size: 0.95rem;
            font-weight: 500;
            color: #d3e0ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .robot-check i {
            color: var(--soft-purple);            /* violet icon */
            font-size: 1.1rem;
        }

        /* error message styling (kept clean) */
        .error-msg {
            background: #2f1f2f;
            color: #ffb0b0;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 8px;
            border-left: 6px solid #ff6b6b;
            text-align: left;
        }

        .error-msg i {
            font-size: 1rem;
        }

        .error-msg.show {
            display: flex;
        }

        /* primary button — neon gradient (deep blue to light blue) */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #1f3a85, #2b4b9a, #3b6ed6);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.25s;
            box-shadow: 0 8px 20px -6px var(--highlight);
            border: 1px solid rgba(93,155,255,0.5);
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .btn-primary i {
            font-size: 1.1rem;
            transition: transform 0.2s;
            color: var(--teal-accent);            /* teal arrow */
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #27499f, #2f5ab5, #4f82f0);
            box-shadow: 0 14px 28px -6px var(--highlight);
            transform: scale(1.01);
        }

        .btn-primary:hover i {
            transform: translateX(4px);
        }

        /* switch / toggle panel (deep blue with violet hints) */
        .switch-panel {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #b1c6f0;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            background: #1d2b50;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            border: 1px solid var(--highlight);
        }

        .switch-panel a {
            color: var(--soft-purple);            /* violet link */
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0.2rem 0.8rem;
            background: #263d70;
            border-radius: 40px;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            border: 1px solid rgba(93,155,255,0.3);
        }

        .switch-panel a:hover {
            background: #2f4b8a;
            color: white;
            border-color: var(--teal-accent);
        }

        /* hidden captcha helper */
        .hidden-captcha {
            display: none;
        }

        /* internal footer */
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #7f94c2;
            margin-top: 1.5rem;
        }

        /* additional dark touches */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
        }
    </style>
</head>
<body>
<div class="auth-card" id="authCard">
    <div class="logo">
        <i class="fas fa-chart-line"></i> Growth Sphere
    </div>
    <div class="greeting">
        <i class="fas fa-user-plus" style="margin-right: 6px;"></i> create your professional account
    </div>

    <!-- DYNAMIC FORM INJECTION via JS (login / register) -->
    <div id="formContainer"></div>

    <!-- small footer (static) -->
    <div class="footer-note">
        <i class="far fa-shield-alt"></i> protected & encrypted
    </div>
</div>

<script>
    (function() {
        // ---- primary colour variable reused ----
        const primary = '#132043';

        // Same-origin API base (works locally and on Vercel without changes).
        const API_BASE = '/api/auth';

        // Real email check, mirrors the server-side rule so users get instant
        // feedback before the request even goes out.
        const EMAIL_REGEX = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$/;
        function isValidEmail(email) {
            if (!email) return false;
            const trimmed = email.trim();
            if (!EMAIL_REGEX.test(trimmed)) return false;
            const [local] = trimmed.split('@');
            if (local.startsWith('.') || local.endsWith('.') || local.includes('..')) return false;
            return true;
        }
        function isValidPassword(pw) {
            return typeof pw === 'string' && pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw);
        }

        function setButtonLoading(btn, loading, idleLabel) {
            if (!btn) return;
            btn.disabled = loading;
            btn.innerHTML = loading
                ? `<span>Please wait…</span> <i class="fas fa-spinner fa-spin"></i>`
                : idleLabel;
        }

        // --- render register form (real password field, real validation) ---
        function renderRegister() {
            const container = document.getElementById('formContainer');
            if (!container) return;

            container.innerHTML = `
                <form id="registerForm">
                    <div class="input-field">
                        <label><i class="fas fa-user"></i> Full name</label>
                        <input type="text" id="regName" placeholder="John Carter" autocomplete="name" required>
                    </div>

                    <div class="input-field">
                        <label><i class="fas fa-calendar-alt"></i> Date of birth</label>
                        <input type="date" id="regDob" required>
                    </div>

                    <div class="input-field">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="regEmail" placeholder="hello@domain.com" autocomplete="email" required>
                    </div>

                    <div class="input-field">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="regPassword" placeholder="At least 8 characters, with a number" autocomplete="new-password" required>
                    </div>

                    <div class="input-field">
                        <label><i class="fas fa-lock"></i> Confirm password</label>
                        <input type="password" id="regPasswordConfirm" placeholder="Re-enter your password" autocomplete="new-password" required>
                    </div>

                    <!-- dynamic error message -->
                    <div class="error-msg" id="registerError">
                        <i class="fas fa-exclamation-circle"></i> <span id="errorText">Invalid form</span>
                    </div>

                    <button type="submit" class="btn-primary" id="registerSubmitBtn">
                        <span>Register</span> <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="switch-panel">
                    <span>Already registered?</span>
                    <a id="goToLoginLink"><i class="fas fa-sign-in-alt"></i> Sign in</a>
                </div>
            `;

            const regForm = document.getElementById('registerForm');
            const errorDiv = document.getElementById('registerError');
            const errorSpan = document.getElementById('errorText');
            const submitBtn = document.getElementById('registerSubmitBtn');
            const idleLabel = `<span>Register</span> <i class="fas fa-arrow-right"></i>`;

            function showError(msg) {
                errorSpan.innerText = msg;
                errorDiv.classList.add('show');
            }

            regForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                errorDiv.classList.remove('show');

                const fullName = document.getElementById('regName')?.value.trim() || "";
                const dob = document.getElementById('regDob')?.value || "";
                const email = document.getElementById('regEmail')?.value.trim() || "";
                const password = document.getElementById('regPassword')?.value || "";
                const passwordConfirm = document.getElementById('regPasswordConfirm')?.value || "";

                // ---- client-side validation (server re-validates everything too) ----
                if (fullName.length < 2) return showError("Please enter your full name.");
                if (!dob) return showError("Date of birth is required.");
                if (!isValidEmail(email)) return showError("Please enter a valid email address.");
                if (!isValidPassword(password)) return showError("Password must be at least 8 characters and include a letter and a number.");
                if (password !== passwordConfirm) return showError("Passwords do not match.");

                try {
                    setButtonLoading(submitBtn, true);
                    const res = await fetch(`${API_BASE}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include', // sends/receives the auth cookie
                        body: JSON.stringify({ fullName, email, password, dob }),
                    });
                    const data = await res.json();

                    if (!res.ok) {
                        showError(data.error || "Registration failed. Please try again.");
                        return;
                    }

                    window.location.href = "home.html";
                } catch (err) {
                    showError("Could not reach the server. Please check your connection and try again.");
                } finally {
                    setButtonLoading(submitBtn, false, idleLabel);
                }
            });

            document.getElementById('goToLoginLink')?.addEventListener('click', function(e) {
                e.preventDefault();
                renderLogin();
            });
        }

        // --- render login form (pro version, dark theme) ---
        function renderLogin() {
            const container = document.getElementById('formContainer');
            container.innerHTML = `
                <form id="loginForm">
                    <div class="input-field">
                        <label><i class="fas fa-id-card"></i> Email</label>
                        <input type="email" id="loginUser" placeholder="e.g. emily@growthsphere.com" autocomplete="email" required>
                    </div>

                    <div class="input-field">
                        <label><i class="fas fa-key"></i> Password</label>
                        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
                    </div>

                    <!-- dynamic error message -->
                    <div class="error-msg" id="loginError">
                        <i class="fas fa-exclamation-circle"></i> <span id="loginErrorText">Invalid credentials</span>
                    </div>

                    <button type="submit" class="btn-primary" id="loginSubmitBtn">
                        <span>Log in</span> <i class="fas fa-arrow-right"></i>
                    </button>

                    <div style="margin-top: 1.2rem; text-align:center; font-size:0.85rem; color:#7f94c2;">
                        <i class="fas fa-shield"></i> secured by Growth Sphere
                    </div>
                </form>

                <div class="switch-panel" style="margin-top:1.8rem;">
                    <span>Don't have an account?</span>
                    <a id="goToRegisterLink"><i class="fas fa-user-plus"></i> Register</a>
                </div>
            `;

            const loginForm = document.getElementById('loginForm');
            const errorDiv = document.getElementById('loginError');
            const errorSpan = document.getElementById('loginErrorText');
            const submitBtn = document.getElementById('loginSubmitBtn');
            const idleLabel = `<span>Log in</span> <i class="fas fa-arrow-right"></i>`;

            function showError(msg) {
                errorSpan.innerText = msg;
                errorDiv.classList.add('show');
            }

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                errorDiv.classList.remove('show');

                const email = document.getElementById('loginUser')?.value.trim() || "";
                const password = document.getElementById('loginPass')?.value || "";

                if (!isValidEmail(email)) return showError("Please enter a valid email address.");
                if (!password) return showError("Please enter your password.");

                try {
                    setButtonLoading(submitBtn, true);
                    const res = await fetch(`${API_BASE}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ email, password }),
                    });
                    const data = await res.json();

                    if (!res.ok) {
                        showError(data.error || "Login failed. Please try again.");
                        return;
                    }

                    window.location.href = "home.html";
                } catch (err) {
                    showError("Could not reach the server. Please check your connection and try again.");
                } finally {
                    setButtonLoading(submitBtn, false, idleLabel);
                }
            });

            document.getElementById('goToRegisterLink')?.addEventListener('click', function(e) {
                e.preventDefault();
                renderRegister();
            });
        }

        // initial render: register
        window.addEventListener('DOMContentLoaded', () => {
            renderRegister();
        });

        window.showLogin = function() {
            renderLogin();
        };
    })();
</script>
</body>
</html>
